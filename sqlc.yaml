version: "2"
sql:
  - engine: "postgresql"
    queries: "backend/database/queries"
    schema: "backend/database/migrations"
    gen:
      go:
        package: "db"
        out: "backend/database/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        json_tags_case_style: "camel"
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_all_enum_values: true
        emit_pointers_for_null_types: true
        query_parameter_limit: 0
        overrides:
          - db_type: "pg_catalog.numeric"
            go_type:
              import: "github.com/shopspring/decimal"
              package: "decimal"
              type: "Decimal"
          - db_type: "pg_catalog.numeric"
            nullable: true
            go_type:
              import: "github.com/shopspring/decimal"
              package: "decimal"
              type: "Decimal"
              pointer: true
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: "json"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
