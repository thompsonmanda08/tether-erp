openapi: 3.0.0
info:
  title: Tether-ERP Procurement API
  description: |
    Comprehensive REST API for procurement management system with approval workflows,
    budget constraints, document linking, and multi-stage approval chains.
  version: 1.0.0
  contact:
    name: Tether-ERP Support
    email: support@tether-erp.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080/api/v1
    description: Development Server
  - url: https://api.tether-erp.com/api/v1
    description: Production Server

tags:
  - name: Health
    description: System health and status endpoints
  - name: Authentication
    description: User authentication, registration, and session management
  - name: Organizations
    description: Organization management and switching
  - name: Organization Members
    description: Organization member and user management
  - name: Departments
    description: Department management within organizations
  - name: Roles
    description: Organization role and permission management
  - name: User Permissions
    description: Individual user permission management
  - name: Requisitions
    description: Purchase requisition management
  - name: Budgets
    description: Budget allocation and management
  - name: Purchase Orders
    description: Purchase order creation and tracking
  - name: GRN
    description: Goods Received Notes management
  - name: Payment Vouchers
    description: Payment voucher management
  - name: Categories
    description: Category and budget code management
  - name: Vendors
    description: Vendor master data management
  - name: Approvals
    description: Approval workflow and task management
  - name: Documents
    description: Generic document management system
  - name: Workflows
    description: Workflow configuration and management
  - name: Analytics
    description: Dashboard and metrics analytics
  - name: Notifications
    description: User notification management
  - name: Audit Logs
    description: System audit trail and logging

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Returns the health status of the API server
      operationId: healthCheck
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Tether-ERP Backend API is running

  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticates user with email and password, returns JWT token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: user@company.com
                password:
                  type: string
                  format: password
                  example: securepassword123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      user:
                        $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/register:
    post:
      tags:
        - Authentication
      summary: User registration
      description: Register a new user account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        "201":
          description: Registration successful
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/verify:
    post:
      tags:
        - Authentication
      summary: Verify email
      description: Verify user email with token
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Email verified successfully
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh token
      description: Refresh the JWT access token using refresh token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      token:
                        type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/password-reset/request:
    post:
      tags:
        - Authentication
      summary: Request password reset
      description: Send password reset email to user
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Password reset email sent

  /auth/password-reset/confirm:
    post:
      tags:
        - Authentication
      summary: Confirm password reset
      description: Reset password with token
      operationId: confirmPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - password
              properties:
                token:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Password reset successful
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/profile:
    get:
      tags:
        - Authentication
      summary: Get user profile
      description: Get the current authenticated user's profile
      operationId: getProfile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout
      description: Logout the current session
      operationId: logout
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Logged out successfully

  /auth/logout-all:
    post:
      tags:
        - Authentication
      summary: Logout all sessions
      description: Logout from all devices/sessions
      operationId: logoutAll
      security:
        - BearerAuth: []
      responses:
        "200":
          description: All sessions logged out

  /auth/change-password:
    post:
      tags:
        - Authentication
      summary: Change password
      description: Change the current user's password
      operationId: changePassword
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
      responses:
        "200":
          description: Password changed successfully
        "400":
          $ref: "#/components/responses/BadRequest"

  /organizations:
    get:
      tags:
        - Organizations
      summary: List user's organizations
      description: Get all organizations the current user belongs to
      operationId: getOrganizations
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Organization"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags:
        - Organizations
      summary: Create organization
      description: Create a new organization
      operationId: createOrganization
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Organization"
        "400":
          $ref: "#/components/responses/BadRequest"

  /organizations/{id}:
    put:
      tags:
        - Organizations
      summary: Update organization
      operationId: updateOrganization
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationRequest"
      responses:
        "200":
          description: Organization updated
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - Organizations
      summary: Delete organization
      operationId: deleteOrganization
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Organization deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /organizations/{id}/switch:
    post:
      tags:
        - Organizations
      summary: Switch organization
      description: Switch the current active organization context
      operationId: switchOrganization
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Organization switched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        description: New JWT token with updated organization context
        "404":
          $ref: "#/components/responses/NotFound"

  /organization/members:
    get:
      tags:
        - Organization Members
      summary: List organization members
      operationId: getOrganizationMembers
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrganizationMember"

    post:
      tags:
        - Organization Members
      summary: Add organization member
      operationId: addOrganizationMember
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
      responses:
        "201":
          description: Member added
        "400":
          $ref: "#/components/responses/BadRequest"

  /organization/members/{userId}:
    delete:
      tags:
        - Organization Members
      summary: Remove organization member
      operationId: removeOrganizationMember
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member removed
        "404":
          $ref: "#/components/responses/NotFound"

  /organization/users:
    get:
      tags:
        - Organization Members
      summary: List organization users
      description: Get all users in the organization with their details
      operationId: getOrganizationUsers
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"

    post:
      tags:
        - Organization Members
      summary: Create organization user
      description: Create a new user within the organization
      operationId: createOrganizationUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - name
                - password
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                password:
                  type: string
                role:
                  type: string
      responses:
        "201":
          description: User created
        "400":
          $ref: "#/components/responses/BadRequest"

  /organization/settings:
    get:
      tags:
        - Organization Members
      summary: Get organization settings
      operationId: getOrganizationSettings
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Organization settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object

    put:
      tags:
        - Organization Members
      summary: Update organization settings
      operationId: updateOrganizationSettings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Settings updated

  /organization/departments:
    get:
      tags:
        - Departments
      summary: List departments
      operationId: getDepartments
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Department"

    post:
      tags:
        - Departments
      summary: Create department
      operationId: createDepartment
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentRequest"
      responses:
        "201":
          description: Department created
        "400":
          $ref: "#/components/responses/BadRequest"

  /organization/departments/{id}:
    get:
      tags:
        - Departments
      summary: Get department by ID
      operationId: getDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Department details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Department"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags:
        - Departments
      summary: Update department
      operationId: updateDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDepartmentRequest"
      responses:
        "200":
          description: Department updated
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - Departments
      summary: Delete department
      operationId: deleteDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Department deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /organization/departments/{id}/restore:
    post:
      tags:
        - Departments
      summary: Restore deleted department
      operationId: restoreDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Department restored
        "404":
          $ref: "#/components/responses/NotFound"

  /organization/departments/{id}/modules:
    get:
      tags:
        - Departments
      summary: Get department modules
      operationId: getDepartmentModules
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of modules
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags:
        - Departments
      summary: Add module to department
      operationId: addDepartmentModule
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - moduleId
              properties:
                moduleId:
                  type: string
      responses:
        "201":
          description: Module added
        "404":
          $ref: "#/components/responses/NotFound"

  /organization/departments/{departmentId}/modules/{moduleId}:
    delete:
      tags:
        - Departments
      summary: Remove module from department
      operationId: removeDepartmentModule
      security:
        - BearerAuth: []
      parameters:
        - name: departmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: moduleId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Module removed
        "404":
          $ref: "#/components/responses/NotFound"

  /organization/departments/{departmentId}/users:
    get:
      tags:
        - Departments
      summary: Get department users
      operationId: getDepartmentUsers
      security:
        - BearerAuth: []
      parameters:
        - name: departmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of users in department
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{userId}/department/{departmentId}:
    post:
      tags:
        - Departments
      summary: Assign user to department
      operationId: assignUserToDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: departmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User assigned to department
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{userId}/department:
    get:
      tags:
        - Departments
      summary: Get user's department
      operationId: getUserDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User's department
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - Departments
      summary: Remove user from department
      operationId: removeUserFromDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User removed from department
        "404":
          $ref: "#/components/responses/NotFound"

  /permissions:
    get:
      tags:
        - User Permissions
      summary: Get all system permissions
      description: List all available permissions in the system
      operationId: getAllPermissions
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: string

  /users/{userId}/permissions:
    get:
      tags:
        - User Permissions
      summary: Get user permissions
      operationId: getUserPermissions
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User's permissions
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{userId}/permissions/{resource}/{action}:
    post:
      tags:
        - User Permissions
      summary: Grant permission to user
      operationId: grantUserPermission
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: resource
          in: path
          required: true
          schema:
            type: string
          example: requisition
        - name: action
          in: path
          required: true
          schema:
            type: string
          example: approve
      responses:
        "200":
          description: Permission granted
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - User Permissions
      summary: Revoke permission from user
      operationId: revokeUserPermission
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: resource
          in: path
          required: true
          schema:
            type: string
        - name: action
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Permission revoked
        "404":
          $ref: "#/components/responses/NotFound"

  /requisitions:
    get:
      tags:
        - Requisitions
      summary: List all requisitions
      description: Retrieve paginated list of requisitions with optional filtering
      operationId: getRequisitions
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, pending, approved, rejected, fulfilled]
        - name: department
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of requisitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags:
        - Requisitions
      summary: Create new requisition
      description: Create a new purchase requisition in draft status
      operationId: createRequisition
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRequisitionRequest"
      responses:
        "201":
          description: Requisition created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/RequisitionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /requisitions/{id}:
    get:
      tags:
        - Requisitions
      summary: Get requisition by ID
      description: Retrieve a single requisition with all details
      operationId: getRequisition
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Requisition details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/RequisitionResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

    put:
      tags:
        - Requisitions
      summary: Update requisition
      description: Update a requisition (only draft status can be updated)
      operationId: updateRequisition
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRequisitionRequest"
      responses:
        "200":
          description: Requisition updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/RequisitionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
