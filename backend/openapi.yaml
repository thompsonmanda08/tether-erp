components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login endpoint

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [admin, manager, approver, user]
        department:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        hasNext:
          type: boolean
        hasPrev:
          type: boolean

    CreateRequisitionRequest:
      type: object
      required:
        - department
        - totalAmount
        - currency
        - deliveryDate
      properties:
        department:
          type: string
        totalAmount:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
        currency:
          type: string
          example: USD
        deliveryDate:
          type: string
          format: date-time
        description:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              description:
                type: string
              quantity:
                type: number
              unitPrice:
                type: number
              amount:
                type: number

    UpdateRequisitionRequest:
      type: object
      properties:
        department:
          type: string
        totalAmount:
          type: number
        currency:
          type: string
        deliveryDate:
          type: string
          format: date-time
        description:
          type: string

    RequisitionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        reqNumber:
          type: string
        userId:
          type: string
          format: uuid
        department:
          type: string
        status:
          type: string
          enum: [draft, pending, approved, rejected, fulfilled]
        totalAmount:
          type: number
        currency:
          type: string
        deliveryDate:
          type: string
          format: date-time
        approvalStage:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateBudgetRequest:
      type: object
      required:
        - budgetCode
        - department
        - fiscalYear
        - totalBudget
      properties:
        budgetCode:
          type: string
        department:
          type: string
        fiscalYear:
          type: string
          pattern: '^\d{4}$'
        totalBudget:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
        allocatedAmount:
          type: number
          default: 0

    UpdateBudgetRequest:
      type: object
      properties:
        totalBudget:
          type: number
        allocatedAmount:
          type: number

    BudgetResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        budgetCode:
          type: string
        department:
          type: string
        fiscalYear:
          type: string
        status:
          type: string
          enum: [draft, pending, approved, rejected]
        totalBudget:
          type: number
        allocatedAmount:
          type: number
        remainingAmount:
          type: number
        approvalStage:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreatePurchaseOrderRequest:
      type: object
      required:
        - vendorId
        - totalAmount
        - currency
        - deliveryDate
      properties:
        vendorId:
          type: string
          format: uuid
        totalAmount:
          type: number
        currency:
          type: string
        deliveryDate:
          type: string
          format: date-time
        linkedRequisition:
          type: string
          format: uuid
        items:
          type: array
          items:
            type: object

    UpdatePurchaseOrderRequest:
      type: object
      properties:
        vendorId:
          type: string
        totalAmount:
          type: number
        currency:
          type: string
        deliveryDate:
          type: string

    PurchaseOrderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        poNumber:
          type: string
        vendorId:
          type: string
          format: uuid
        status:
          type: string
        totalAmount:
          type: number
        currency:
          type: string
        deliveryDate:
          type: string
          format: date-time
        linkedRequisition:
          type: string
          format: uuid
        approvalStage:
          type: integer
        createdAt:
          type: string
          format: date-time

    CreateGRNRequest:
      type: object
      required:
        - poNumber
        - receivedBy
        - items
      properties:
        poNumber:
          type: string
        receivedBy:
          type: string
        items:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              itemNo:
                type: integer
              description:
                type: string
              quantity:
                type: number
              receivedQty:
                type: number

    GRNResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        grnNumber:
          type: string
        poNumber:
          type: string
        status:
          type: string
        receivedDate:
          type: string
          format: date-time
        receivedBy:
          type: string
        items:
          type: array
        qualityIssues:
          type: array
        approvalStage:
